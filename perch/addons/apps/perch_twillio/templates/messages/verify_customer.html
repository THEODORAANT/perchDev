<perch:form id="verify" method="post" app="perch_twillio" class="form-container">
    <div class="row">
        <div class="col-lg-12 col-md-12 col-sm-12">
            <div class="form-group">
                <perch:label for="verify_code">Verify Code</perch:label>
                <perch:input class="form-control" type="text" id="verify_code" required="true" label="Verify Code" placeholder="Verify Code"/>
                <perch:error for="verify_code" type="required">Please add the verification code</perch:error>
            </div>
        </div>

    </div>

    <div class="row">
        <div class="col-lg-12 mt-4">
            <perch:input type="submit" class="btn btn-continue text-uppercase" id="submit" value="Continue" />
        </div>
    </div>
</perch:form>
