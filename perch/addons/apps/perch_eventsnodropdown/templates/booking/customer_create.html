<perch:form id="register" method="post" app="perch_events">
	
	<div class="row">
		<div class="col-lg-12 col-md-12 col-sm-12">
			<h3 class="text-uppercase font-weight-bold mt-4">Create Account</h3>
		</div>
	</div>

	<fieldset>
		   <!-- <legend>About you</legend> -->
		   
		<div class="row">
			<div class="col-lg-12 col-md-12 col-sm-12">
				<div class="form-group">
					<perch:label for="first_name">First name</perch:label>
					<perch:input class="form-control" type="text" id="first_name" required="true" label="First name" placeholder="First Name"/>
					<perch:error for="first_name" type="required">Please add your name</perch:error>
				</div>

				<div class="form-group">
					<perch:label for="last_name">Last name</perch:label>
					<perch:input class="form-control" type="text" id="last_name" required="true" label="Last name" placeholder="Last Name" />
					<perch:error for="last_name" type="required">Please add your name</perch:error>
				</div>

				<div class="form-group">
					<perch:label for="email">Email</perch:label>
					<perch:input class="form-control" type="email" id="email" required="true" placeholder="Email" helper="PerchMembers_Members::check_email" />
					<perch:error for="email" type="required">Please add your email address</perch:error>
					<perch:error for="email" type="helper">That email address is already in use</perch:error>
				</div>

				<div class="form-group">
					<perch:label for="password">Password</perch:label>
					<perch:input class="form-control" type="password" id="password" required="true" match-with="password2" placeholder="Password" />
					<perch:error for="password" type="required">Please add a password</perch:error>
					<perch:error for="password" type="match">Passwords do not match</perch:error>
				</div>

				<div class="form-group">
					<perch:label for="password2">Confirm Password </perch:label>
					<perch:input class="form-control" type="password" id="password2" required="true" placeholder="Confirm Password" />
					<perch:error for="password2" type="required">Please repeat your password</perch:error>
				</div>
			</div>
		</div>
	</fieldset>


		<div class="row">
			<div class="col-lg-12 mt-4">
				<perch:input type="submit" class="btn btn-continue text-uppercase" id="submit" value="Continue" />
			</div>
		</div>

	<perch:success>
		<p>Thanks!</p>
	</perch:success>

</perch:form>
